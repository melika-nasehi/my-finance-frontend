<div class="assets-card">
  <div class="assets-list">
    <div class="asset-row" *ngFor="let asset of assets">
      <div class="asset-info">
        <span class="name">{{ asset.name }}</span>
        <span class="type">{{ asset.type }}</span>
        <div class="amount-row">
          <span class="price">${{ asset.amount | number }}</span>
          <span class="growth">{{ asset.growth_rate }}% growth</span>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="edit-btn" (click)="onEdit(asset)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="delete-btn" (click)="onDelete(asset.id)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button class="add-button" (click)="openModal()">+ Add Asset</button>

  <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h4>{{ isEditMode ? 'Edit' : 'New' }} Asset</h4>
      <div class="form-group">
        <label>Asset Name</label>
        <input [(ngModel)]="newAsset.name" placeholder="e.g. Real Estate" />
      </div>
      <div class="form-group">
        <label>Current Value ($)</label>
        <input type="number" [(ngModel)]="newAsset.amount" />
      </div>
      <div class="form-group">
        <label>Growth Rate (%)</label>
        <input type="number" [(ngModel)]="newAsset.growth_rate" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-save" (click)="onSubmit()">{{ isEditMode ? 'Update' : 'Save' }}</button>
      </div>
    </div>
  </div>
</div>
