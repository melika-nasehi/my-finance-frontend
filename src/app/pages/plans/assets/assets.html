<div class="card-container">
  <div class="card-header">
    <div class="header-info">
      <div class="icon-bg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="header-icon">
          <path d="M12 1v22m5-18H6.9a3 3 0 0 0 0 6h10.2a3 3 0 0 1 0 6H6.2"></path>
        </svg>
      </div>
      <div class="title-wrap">
        <h3>Assets</h3>
        <p>What you own right now</p>
      </div>
    </div>
    <button class="import-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3"></path>
      </svg>
      Import from accounts ({{ assets.length }})
    </button>
  </div>

  <div class="items-list">
    <div class="asset-item" *ngFor="let asset of assets">
      <div class="asset-main">
        <span class="asset-name">{{ asset.name }}</span>
        <span class="asset-type">{{ asset.type }}</span>
        <div class="value-box">
          <span class="amount">${{ asset.amount | number }}</span>
          <span class="growth-tag" *ngIf="asset.growth">{{ asset.growth }} growth</span>
        </div>
      </div>
      <div class="asset-actions">
        <button class="btn-action">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="btn-action delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button class="add-item-btn">
    <span class="plus-icon">+</span> Add Asset
  </button>
</div>
