<div class="assets-card">
  <div class="card-header">
    <div class="header-content">
      <div class="icon-wrapper flow-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M7 11l5-5 5 5M7 13l5 5 5-5"></path>
        </svg>
      </div>
      <div class="text-group">
        <h3>Cash Flow</h3>
        <p>Monthly in & out</p>
      </div>
    </div>
  </div>

  <div class="assets-list">
    <div class="asset-row" *ngFor="let flow of cashFlows">
      <div class="asset-info">
        <span class="name">{{ flow.name }}</span>
        <span class="type">{{ flow.frequency }}</span>
        <div class="amount-row">
          <span class="price" [style.color]="flow.flow_type === 'in' ? '#00d084' : '#ff5b5b'">
            {{ flow.flow_type === 'in' ? '+' : '-' }}${{ flow.amount | number }}
          </span>
        </div>
      </div>
      <div class="action-buttons" style="display: flex; gap: 8px;">
        <button class="edit-btn" (click)="onEdit(flow)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="delete-btn" (click)="onDelete(flow.id)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
            <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button class="add-button" (click)="openModal()">+ Add Cash Flow</button>

  <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h4>{{ isEditMode ? 'Edit' : 'New' }} Cash Flow</h4>
      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="newFlow.name" placeholder="e.g. Salary" />
      </div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" [(ngModel)]="newFlow.amount" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select [(ngModel)]="newFlow.flow_type">
          <option value="in">Inflow (Income)</option>
          <option value="out">Outflow (Expense)</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-save" (click)="onSubmit()">{{ isEditMode ? 'Update' : 'Save' }}</button>
      </div>
    </div>
  </div>
</div>
